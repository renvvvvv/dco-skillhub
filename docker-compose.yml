version: '3.8'

services:
  nginx:
    build: ./frontend
    ports:
      - "8088:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - backend_storage:/app/storage:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "8080"
    volumes:
      - backend_data:/app/data
      - backend_storage:/app/storage
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

volumes:
  backend_data:
  backend_storage:
