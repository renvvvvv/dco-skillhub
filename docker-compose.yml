version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8088:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - backend_storage:/app/storage:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: doc-skillhub-backend:new
    expose:
      - "8080"
    volumes:
      - backend_data:/app/data
      - backend_storage:/app/storage
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    dns:
      - 8.8.8.8
      - 114.114.114.114
    restart: unless-stopped

volumes:
  backend_data:
  backend_storage:
